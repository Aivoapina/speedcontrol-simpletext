<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Interview</title>
    <script type="module" src="js/layouts.js"></script>
    <link rel="stylesheet" href="css/common.css" />
    <style>
      body {
        width: 1920px;
        height: 1080px;
        margin: 0;
      }

      .container {
        position: absolute;
        width: 100%;
        bottom: 200px;
        display: flex;
        justify-content: space-around;
      }

      .leftContainer,
      .rightContainer {
        position: relative;
        display: flex;
        flex-direction: column;
        align-items: center;
        width: 50%;

        opacity: 0;
        animation: fadeIn 0.6s ease-out forwards;
        animation-delay: 2s;
      }

      @keyframes fadeIn {
        to {
          opacity: 1;
        }
      }

      #leftSideName,
      #rightSideName {
        font-size: 60px;
        font-weight: bold;
        text-shadow: 3px 3px rgba(0, 0, 0, 0.7);
        text-transform: uppercase;
        background-color: rgb(45, 45, 45);
        padding: 0px 30px;
        width: 50%;
        font-family: "Roboto Condensed";
      }

      #leftSideDescription,
      #rightSideDescription {
        position: absolute;
        top: 110%;
        font-size: 30px;
        white-space: nowrap;
      }

      .desc {
        background-color: rgb(45, 45, 45);
        padding: 5px 10px;
        text-shadow: 2px 2px black;
      }

      .tag {
        text-transform: none;
        font-family: "Pt Sans Narrow";
      }
    </style>
  </head>

  <body>
    <div class="container">
      <div class="leftContainer">
        <span id="leftSideName"></span>
        <span class="tag" id="leftSideDescription"></span>
      </div>

      <div class="rightContainer">
        <span id="rightSideName"></span>
        <span class="tag" id="rightSideDescription"></span>
      </div>
    </div>

    <script>
      const speedcontrolBundle = "nodecg-speedcontrol";

      const interviewData = nodecg.Replicant(
        "interviewData",
        speedcontrolBundle,
      );

      NodeCG.waitForReplicants(interviewData).then(() => {
        interviewData.on("change", (newVal) => {
          if (!newVal) return;

          document.getElementById("leftSideName").textContent =
            newVal.left || "";
          document.getElementById("rightSideName").textContent =
            newVal.right || "";

          document.getElementById("leftSideDescription").textContent =
            newVal.leftDesc || "";
          document.getElementById("rightSideDescription").textContent =
            newVal.rightDesc || "";
        });
      });
    </script>
  </body>
</html>
